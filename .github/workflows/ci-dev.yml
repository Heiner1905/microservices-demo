# =============================================================================
# Pipeline de Desarrollo — CI/CD
# Taller 1: Construcción de pipelines en Cloud
# Integrantes: Heiner Rincón - Mariana De La Cruz
#
# Trigger: push a feature/* o develop
# Jobs:    build + test + push a ACR (por microservicio)
# =============================================================================

name: CI — Development Pipeline

on:
  push:
    branches:
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - develop

env:secrets
  # Se llena automáticamente con el output de Terraform
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  RESOURCE_GROUP:   ${{ secrets.AZURE_RESOURCE_GROUP }}
  AKS_CLUSTER:      ${{ secrets.AKS_CLUSTER_NAME }}

jobs:

# =============================================================================
# JOB 1 — Microservicio VOTE (Java / Spring Boot)
# =============================================================================
  build-vote:
    name: Build & Push — vote (Java)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar y ejecutar tests (Maven)
        working-directory: vote
        run: ./mvnw clean verify

      - name: Login en Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login en ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build y push imagen Docker — vote
        working-directory: vote
        run: |
          IMAGE_TAG=${{ env.ACR_LOGIN_SERVER }}/vote:${{ github.sha }}
          docker build -t $IMAGE_TAG .
          docker push $IMAGE_TAG
          # También taggear como latest en develop
          if [ "${{ github.ref }}" == "refs/heads/develop" ]; then
            docker tag $IMAGE_TAG ${{ env.ACR_LOGIN_SERVER }}/vote:latest
            docker push ${{ env.ACR_LOGIN_SERVER }}/vote:latest
          fi

# =============================================================================
# JOB 2 — Microservicio RESULT (Node.js)
# =============================================================================
  build-result:
    name: Build & Push — result (Node.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: result/package.json

      - name: Instalar dependencias
        working-directory: result
        run: npm install

      - name: Login en Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login en ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build y push imagen Docker — result
        working-directory: result
        run: |
          IMAGE_TAG=${{ env.ACR_LOGIN_SERVER }}/result:${{ github.sha }}
          docker build -t $IMAGE_TAG .
          docker push $IMAGE_TAG
          if [ "${{ github.ref }}" == "refs/heads/develop" ]; then
            docker tag $IMAGE_TAG ${{ env.ACR_LOGIN_SERVER }}/result:latest
            docker push ${{ env.ACR_LOGIN_SERVER }}/result:latest
          fi

# =============================================================================
# JOB 3 — Microservicio WORKER (Go)
# =============================================================================
  build-worker:
    name: Build & Push — worker (Go)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Go 1.21
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: worker/go.mod

      - name: Build Go (verificar compilación)
        working-directory: worker
        run: go build ./...

      - name: Login en Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login en ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build y push imagen Docker — worker
        working-directory: worker
        run: |
          IMAGE_TAG=${{ env.ACR_LOGIN_SERVER }}/worker:${{ github.sha }}
          docker build -t $IMAGE_TAG .
          docker push $IMAGE_TAG
          if [ "${{ github.ref }}" == "refs/heads/develop" ]; then
            docker tag $IMAGE_TAG ${{ env.ACR_LOGIN_SERVER }}/worker:latest
            docker push ${{ env.ACR_LOGIN_SERVER }}/worker:latest
          fi

# =============================================================================
# JOB 4 — Deploy a AKS (solo si es rama develop)
# Depende de que los 3 builds anteriores pasen
# =============================================================================
  deploy-dev:
    name: Deploy a AKS — develop
    runs-on: ubuntu-latest
    needs: [build-vote, build-result, build-worker]
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login en Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Obtener credenciales AKS
        run: |
          az aks get-credentials \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.AKS_CLUSTER }} \
            --overwrite-existing

      - name: Actualizar imagen vote en AKS
        run: |
          kubectl set image deployment/vote \
            vote=${{ env.ACR_LOGIN_SERVER }}/vote:${{ github.sha }} \
            --namespace default

      - name: Actualizar imagen result en AKS
        run: |
          kubectl set image deployment/result \
            result=${{ env.ACR_LOGIN_SERVER }}/result:${{ github.sha }} \
            --namespace default

      - name: Actualizar imagen worker en AKS
        run: |
          kubectl set image deployment/worker \
            worker=${{ env.ACR_LOGIN_SERVER }}/worker:${{ github.sha }} \
            --namespace default

      - name: Verificar rollout exitoso
        run: |
          kubectl rollout status deployment/vote --timeout=120s
          kubectl rollout status deployment/result --timeout=120s
          kubectl rollout status deployment/worker --timeout=120s